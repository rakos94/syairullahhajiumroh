services:
  mongodb:
    image: mongo:7
    container_name: syairullah-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: syairullah_hajiumroh
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
